<!DOCTYPE html>
<html lang="ko">
<head>
<script>
(function(){
  try {
    var p = JSON.parse(localStorage.getItem('jamodeul-preferences') || '{}');
    var theme = p.theme || localStorage.getItem('jamodeul-theme') || 'system';
    var resolved = theme;
    if (theme === 'system' || (theme !== 'light' && theme !== 'dark')) {
      resolved = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    document.documentElement.setAttribute('data-theme', resolved);
    if (p.reduceMotion) document.documentElement.classList.add('reduce-motion');
    if (p.highContrast) document.documentElement.classList.add('high-contrast');
    if (p.largeText) document.documentElement.classList.add('large-text');
    document.documentElement.lang = p.language === 'ko' ? 'ko' : 'en';
    document.documentElement.setAttribute('data-font-pack', p.devFontPack === 'jua' ? 'jua' : 'junegull');
  } catch (e) {}
})();
</script>

<script>
(async function () {
  try {
    await AppNav.initPage({ topNav: false });
    await I18n?.init?.();
    const root = document.getElementById('related-words-app');
    if (!root) return;
    if (!window.RelatedWordsPuzzles || !window.RelatedWordsGame) {
      root.innerHTML = '<p style="padding:24px;text-align:center">Unable to load Word Chain.</p>';
      return;
    }
    new RelatedWordsGame(root).mount();
  } catch (err) {
    console.error('[Jamodeul] Related words failed to start', err);
    const root = document.getElementById('related-words-app');
    if (root) {
      root.innerHTML = '<p style="padding:24px;text-align:center">Unable to load Word Chain.</p>';
    }
  }
})();
</script>
