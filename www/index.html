<!DOCTYPE html>
<html lang="ko">
<head>
<script>
(function(){
  try {
    var p = JSON.parse(localStorage.getItem('jamodeul-preferences') || '{}');
    var theme = p.theme || localStorage.getItem('jamodeul-theme') || 'system';
    var resolved = theme;
    if (theme === 'system' || (theme !== 'light' && theme !== 'dark')) {
      resolved = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    document.documentElement.setAttribute('data-theme', resolved);
    if (p.reduceMotion) document.documentElement.classList.add('reduce-motion');
    if (p.highContrast) document.documentElement.classList.add('high-contrast');
    if (p.largeText) document.documentElement.classList.add('large-text');
    if (p.tapToPlace) document.documentElement.classList.add('tap-to-place');
    document.documentElement.lang = p.language === 'ko' ? 'ko' : 'en';
    document.documentElement.setAttribute('data-font-pack', p.devFontPack === 'jua' ? 'jua' : 'junegull');
    try {
      var prof = JSON.parse(localStorage.getItem('jamodeul-user-profile') || '{}');
      if (prof.selectedCosmeticTheme && prof.selectedCosmeticTheme !== 'default') {
        document.documentElement.setAttribute('data-cosmetic-theme', prof.selectedCosmeticTheme);
      }
    } catch (e2) {}
  } catch (e) {}
})();
</script>

    align-items: stretch;

  @keyframes fadeDownMenu {

    to { opacity: 1; }

    min-height: 0;

    flex-direction: column;
    overflow: visible;
  }
  #menu-screen .menu-header{
    flex-shrink: 0;
    overflow: visible;
  }
  #menu-screen #menu-root{
    width: 100%;

    min-height: 0;

  }

  .menu-header {
    position: relative;
    z-index: 25;
    width: 100%;
    margin-bottom: 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: visible;
  }

  .menu-top-bar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    display: grid;
    grid-template-columns: minmax(52px, 1fr) auto minmax(52px, 1fr);
    grid-template-rows: 1fr;
    align-items: center;
    width: 100%;
    max-width: none;
    margin: 0;
    min-height: calc(var(--menu-bar-h) + var(--safe-top));
    padding:
      var(--safe-top)
      max(10px, env(safe-area-inset-right, 0px))
      0
      max(10px, env(safe-area-inset-left, 0px));
    background: linear-gradient(180deg,
      var(--menu-bar-teal-top) 0%,
      var(--menu-bar-teal-mid) 55%,
      var(--menu-bar-teal-low) 100%);
    border-bottom: 2px solid rgba(123, 207, 255, 0.38);
    border-radius: 0;
    box-shadow: 0 4px 18px rgba(8, 20, 30, 0.28);
    z-index: 24;
    flex-shrink: 0;
    overflow: visible;
    pointer-events: none;
  }

  .menu-top-bar .menu-profile-nav {
    grid-column: 2;
    grid-row: 1;
    align-self: end;
    margin: 0;
    transform: translateY(var(--menu-profile-drop, 8%));
    pointer-events: auto;
    z-index: 35;

    transform: translateY(var(--menu-profile-drop, 8%)) scale(0.94);

    grid-column: 3;
    grid-row: 1;
    justify-self: end;
    align-self: center;
    pointer-events: auto;
  }

  .menu-header::before {
    content: '';

    left: 0;
    right: 0;
    top: calc(var(--menu-bar-h) + var(--safe-top) + var(--menu-profile-overhang) * 0.35);
    height: var(--menu-header-fade-h);

  @keyframes brand-tile-in-ja {
    from { opacity: 0; transform: scale(0.35) translateY(18px) rotate(-6deg); }
    70% { opacity: 1; transform: scale(1.06) translateY(-3px) rotate(-6deg); }
    to { opacity: 1; transform: scale(1) translateY(0) rotate(-6deg); }

    from { opacity: 0; transform: scale(0.35) translateY(18px) rotate(4deg); }
    70% { opacity: 1; transform: scale(1.06) translateY(-3px) rotate(4deg); }
    to { opacity: 1; transform: scale(1) translateY(0) rotate(4deg); }
  }

  @keyframes brand-tile-in-deul {
    from { opacity: 0; transform: scale(0.35) translateY(18px) rotate(5deg); }
    70% { opacity: 1; transform: scale(1.06) translateY(-3px) rotate(5deg); }
    to { opacity: 1; transform: scale(1) translateY(0) rotate(5deg); }
  }

  body.multiplayer-open,
  body.challenge-open {
    overflow: hidden;
  }

  #confetti-canvas{
    position:fixed; inset:0; pointer-events:none; z-index:20;
  }

  .header{
    display:flex;
    align-items:center;
    gap:14px;
    margin-bottom: 8px;
    animation: fadeDown .5s ease both;
  }
  @keyframes fadeDown{
    from{ opacity:0; transform:translateY(-10px); }
    to{ opacity:1; transform:translateY(0); }
  }
  @keyframes popIn{
    from{ opacity:0; transform:scale(.92) translateY(10px); }
    to{ opacity:1; transform:scale(1) translateY(0); }
  }
  .seal{
    width:56px; height:56px;
    background: var(--peach);
    border: 2px solid var(--peach-btn);
    border-radius: var(--radius-sm);
    display:flex; align-items:center; justify-content:center;
    font-family:'Jua', sans-serif;
    font-size:28px;
    color: var(--heading);
    box-shadow: var(--shadow-sm);
    flex-shrink:0;
  }
  h1{
    font-family:'Jua', 'Noto Sans KR', sans-serif;
    font-weight:400;
    font-size: 36px;
    margin:0;
    letter-spacing: 1px;
    color: var(--heading);
  }
  .subtitle{
    font-size:14px;
    color: var(--text-soft);
    margin: 4px 0 24px;
    text-align:center;
    animation: fadeDown .5s .08s ease both;
    line-height: 1.5;
  }
  .meta-row{ display: none; }
  button.ghost{
    /* app-buttons.css */
  }

  #hint-panel{
    width: 100%;
    margin-bottom: 14px;
    padding: 14px 16px;
    background: var(--mint);
    border: 2px solid var(--mint-btn);
    border-radius: var(--radius-sm);
    display: none;
    animation: fadeDown .3s ease both;
  }
  #hint-panel.show{ display: block; }
  .hint-title{
    font-family: 'Jua', sans-serif;
    font-size: 14px;
    color: var(--correct-text);
    margin-bottom: 8px;
  }
  .hint-line{
    font-size: 14px;
    color: var(--text);
    line-height: 1.6;
    margin-bottom: 4px;
  }
  .hint-line:last-child{ margin-bottom: 0; }
  .hint-def{
    color: var(--text-soft);
    font-style: italic;
    border-bottom: 1px solid var(--border-soft);
    margin-bottom: 8px;
    padding-bottom: 8px;
  }
  .hint-jamo-val{
    font-family: 'Jua', sans-serif;
    font-size: 22px;
    color: var(--correct-text);
    margin-left: 4px;
  }
  .hint-jamo-parts{
    font-size: 12px;
    color: var(--text-soft);
    margin-left: 4px;
  }

  /* ── bottom bar ── */
  #bottom-bar{
    display: flex;
    flex-direction: column;
    width: 100%;
    gap: 10px;
    margin-top: 16px;
    padding-bottom: calc(8px + var(--safe-bottom));
  }
  .bottom-bar-top{
    display: flex;
    width: 100%;
    gap: 10px;
    align-items: flex-start;
  }
  .hint-col{
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 8px;
    flex: 1 1 auto;
    min-width: 0;
  }
  .tracker-col{
    width: 100%;
    min-width: 0;
  }
  .menu-col{
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
    flex: 0 0 auto;
  }

  #token-counter{
    font-family: 'Jua', sans-serif;
    font-size: 11px;
    color: var(--text);
    background: var(--yellow);
    border: 2px solid var(--yellow-btn);
    padding: 4px 8px;
    border-radius: var(--radius-pill);
  }
  #bottom-bar .hint-dock-btn{
    min-height: 38px;
    max-height: 42px;
    padding: 5px 10px;
    gap: 8px;
  }
  #bottom-bar .hint-icon{
    width: 26px;
    height: 26px;
    border-radius: 8px;
  }
  .hi-tile{
    font-family: 'Jua', sans-serif;
    font-size: 14px;
    color: var(--heading);
  }
  .hi-elim{
    font-size: 13px;
    font-weight: 700;
    color: var(--text-soft);
    display: flex;
    align-items: center;
  }
  .hi-x{
    font-size: 10px;
    color: var(--error-text);
    margin-left: 1px;
  }
  .hi-def{
    font-size: 13px;
    font-weight: 700;
    color: var(--heading);
    font-family: 'Jua', sans-serif;
  }
  .hint-btn-text{
    /* app-buttons.css */
  }
  .hint-cost{
    /* app-buttons.css */
  }

  /* ── extra life popup ── */
  #extra-life{
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.94);
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 10px;
    background: var(--card);
    border: 2px solid var(--pink-btn);
    border-radius: 20px;
    padding: 12px 16px;
    cursor: pointer;
    z-index: 200;
    box-shadow: var(--shadow);
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s ease, transform .25s ease;
    user-select: none;
    max-width: min(92vw, 320px);
  }
  #extra-life .el-row-inner{
    display: flex;
    align-items: center;
    gap: 14px;
    white-space: nowrap;
  }
  #extra-life.show{
    opacity: 1;
    pointer-events: auto;
    transform: translate(-50%, -50%) scale(1);
  }
  #extra-life:active .el-row-inner{ transform: scale(0.98); }
  .jamo.shop-hint-reveal{
    box-shadow: inset 0 0 0 2px var(--mint-btn);
  }
  .el-ring{ position: relative; width: 40px; height: 40px; flex-shrink: 0; }
  .el-ring svg{ position: absolute; inset: 0; transform: rotate(-90deg); }
  .el-ring-bg{ fill: none; stroke: var(--border); stroke-width: 3; }
  .el-ring-fill{
    fill: none;
    stroke: var(--pink-btn);
    stroke-width: 3;
    stroke-linecap: round;
    stroke-dasharray: 113;
    stroke-dashoffset: 0;
    transition: stroke-dashoffset .1s linear;
  }
  .el-heart{
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .el-text{ display: flex; flex-direction: column; gap: 2px; }
  .el-title{
    font-family: 'Jua', sans-serif;
    font-size: 15px;
    color: var(--heading);
  }
  .el-sub{ font-size: 12px; color: var(--text-soft); }

  #syl-picker{
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: var(--overlay-scrim);
    align-items: center;
    justify-content: center;
  }
  #syl-picker.show{ display: flex; }
  #syl-picker-inner{
    background: var(--card);
    border: 2px solid var(--border-soft);
    border-radius: var(--radius);
    padding: 28px 24px 22px;
    min-width: 260px;
    text-align: center;
    box-shadow: var(--shadow);
    animation: popIn .3s ease both;
  }
  .syl-picker-title{
    font-family: 'Jua', sans-serif;
    font-size: 16px;
    color: var(--heading);
    margin-bottom: 16px;
  }
  #syl-picker-btns{
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .syl-pick-btn{
    background: var(--mint);
    border: 2px solid var(--mint-btn);
    color: var(--text);
    font-family: 'Jua', sans-serif;
    font-size: 15px;
    padding: 12px 18px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: transform .12s ease;
    min-width: 56px;
  }
  .syl-pick-btn:hover{ transform: translateY(-1px); }
  .syl-pick-btn.revealed{
    opacity: .35;
    cursor: default;
    pointer-events: none;
  }
  #syl-picker-cancel{
    background: var(--card);
    border: 2px solid var(--border);
    color: var(--text-soft);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    padding: 8px 22px;
    border-radius: var(--radius-pill);
    cursor: pointer;
  }

  #board{
    display:flex;
    flex-direction:column;
    gap: var(--row-gap);
    margin-bottom: 16px;
    width: 100%;
    animation: fadeDown .5s .15s ease both;
  }
  .row{
    display:flex;
    gap: var(--board-gap);
    justify-content: center;
    width: 100%;
  }
  .row.row-enter{
    animation: rowSlideIn .35s ease both;
  }
  @keyframes rowSlideIn{
    from{ opacity:0; transform:translateY(6px); }
    to{ opacity:1; transform:translateY(0); }
  }

  .syl{
    width: var(--syl-size);
    height: var(--syl-size);
    flex: 0 0 var(--syl-size);
    border-radius: var(--radius-sm);
    background: var(--card);
    border: 2px solid var(--border);
    display:flex;
    flex-direction:column;
    overflow:hidden;
    position:relative;
    box-shadow: var(--shadow-sm);
  }
  .syl.shake{ animation: shake .45s ease; }
  @keyframes shake{
    0%,100%{ transform:translateX(0); }
    20%{ transform:translateX(-5px); }
    40%{ transform:translateX(5px); }
    60%{ transform:translateX(-4px); }
    80%{ transform:translateX(4px); }
  }

  .row[data-guess="5"] .syl{
    border-color: var(--peach-btn);
    background: var(--peach);
  }

  .syl-row{
    flex:1;
    min-height:0;
    display:flex;
  }
  .syl-row:not(:last-child){
    border-bottom: 1px solid var(--border-soft);
  }
  .syl.syl-triple .syl-row-jong .jamo{ font-size: var(--jamo-font-jong); }
  .syl.syl-blank{
    align-items: center;
    justify-content: center;
    background: var(--card);
  }
  .syl.syl-blank::after{
    content: '';
    width: 16px;
    height: 3px;
    border-radius: 2px;
    background: var(--border);
  }
  .jamo{
    flex:1;
    display:flex; align-items:center; justify-content:center;
    font-family: 'Jua', sans-serif;
    font-size: var(--jamo-font);
    font-weight:400;
    border-right: 1px solid var(--border-soft);
    background: transparent;
    position:relative;
    color: var(--text);
  }
  .jamo:last-child{ border-right:none; }
  .jamo.pending{
    color: var(--heading);
    background: var(--blue);
  }
  .jamo.empty{ color: var(--border); font-size:14px; }

  .jamo.correct{
    background: var(--correct);
    color: var(--correct-text);
    border-color: transparent;
  }
  .jamo.present{
    background: var(--present);
    color: var(--present-text);
    border-color: transparent;
  }
  .jamo.absent{
    background: var(--absent);
    color: var(--absent-text);
    border-color: transparent;
    opacity: 1;
  }

  .jamo.reveal-0, .jamo.reveal-1, .jamo.reveal-2,
  .jamo.reveal-3, .jamo.reveal-4, .jamo.reveal-5{
    animation: tileReveal .35s ease both;
  }
  @keyframes tileReveal{
    0%{ transform: scale(.85); opacity: .5; }
    60%{ transform: scale(1.06); }
    100%{ transform: scale(1); opacity: 1; }
  }

  .jamo.correct.spark,
  .jamo.present.spark{
    animation: tileBounce .4s ease both;
  }
  @keyframes tileBounce{
    0%{ transform: scale(1); }
    40%{ transform: scale(1.1); }
    100%{ transform: scale(1); }
  }

  #input-row{
    display:flex; gap:10px; margin-bottom: 12px;
    width: 100%;
    justify-content: center;
    animation: fadeDown .5s .2s ease both;
  }
  #input-row.shake{ animation: shake .45s ease; }
  #guess-input{
    background: var(--card);
    border: 2px solid var(--border);
    color: var(--text);
    font-family:'Jua', 'Noto Sans KR', sans-serif;
    font-size: 22px;
    text-align:center;
    width: 190px;
    padding: 14px 12px;
    border-radius: var(--radius-sm);
    letter-spacing: 6px;
    transition: border-color .2s ease;
    box-shadow: var(--shadow-sm);
  }
  #guess-input:focus{
    outline:none;
    border-color: var(--blue-btn);
  }
  #guess-input:disabled{ opacity:.45; }
  #submit-btn{
    /* app-buttons.css — square submit beside input */
  }

  #message{
    min-height: 28px;
    font-size: 14px;
    margin-bottom: 14px;
    text-align:center;
    padding: 0 12px;
    border-radius: var(--radius-sm);
    line-height: 1.5;
    transition: all .25s ease;
  }
  #message.show{ animation: messagePop .3s ease both; }
  #message.error{
    background: var(--error-bg);
    color: var(--error-text);
    padding: 10px 14px;
  }
  #message.success{
    background: var(--success-bg);
    color: var(--success-text);
    padding: 10px 14px;
  }
  #message.info{
    background: var(--info-bg);
    color: var(--info-text);
    padding: 10px 14px;
  }
  @keyframes messagePop{
    from{ opacity:0; transform:translateY(-4px); }
    to{ opacity:1; transform:translateY(0); }
  }

  #tracker{
    width: 100%;
    background: var(--card);
    border: 2px solid var(--border-soft);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    box-shadow: var(--shadow-sm);
  }
  .tracker-label{
    font-family: 'Jua', sans-serif;
    font-size:12px;
    color: var(--text-soft);
    margin-bottom:8px;
  }
  .tracker-row{
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 10px;
  }
  .tracker-row:last-child{ margin-bottom:0; }
  .tkey{
    flex: 0 0 auto;
    width: 32px;
    height: 32px;
    border-radius: 10px;
    background: var(--bg-soft);
    border: 2px solid var(--border-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Jua', sans-serif;
    font-size: 14px;
    line-height: 1;
    color: var(--text-soft);
    transition: background .2s ease, color .2s ease, border-color .2s ease;
  }
  .tkey.updated{ animation: keyPop .3s ease both; }
  @keyframes keyPop{
    0%{ transform: scale(1); }
    50%{ transform: scale(1.12); }
    100%{ transform: scale(1); }
  }
  .tkey.correct{
    background: var(--correct);
    color: var(--correct-text);
    border-color: var(--mint-btn);
  }
  .tkey.present{
    background: var(--present);
    color: var(--present-text);
    border-color: var(--yellow-btn);
  }
  .tkey.unused{
    background: rgba(0, 45, 55, 0.45);
    color: rgba(255, 255, 255, 0.32);
    border-color: rgba(255, 255, 255, 0.1);
    opacity: 0.55;
  }
  .tkey.absent{
    background: var(--absent);
    color: var(--absent-text);
    border-color: transparent;
    opacity: .55;
  }

  #overlay{
    position:fixed; inset:0;
    background: var(--overlay-scrim);
    display:none;
    align-items:center;
    justify-content:center;
    z-index: 25;
    opacity:0;
    transition: opacity .25s ease;
    padding: 16px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  #overlay.show{ display:flex; opacity:1; }
  #overlay.show.loss{
    align-items: flex-start;
    justify-content: center;
    padding-top: calc(16px + var(--safe-top));
  }
  .modal{
    background: var(--card);
    border: 2px solid var(--border-soft);
    border-radius: var(--radius);
    padding: 36px 32px;
    text-align:center;
    max-width: 340px;
    width: 100%;
    box-shadow: var(--shadow);
    animation: popIn .4s ease both;
  }
  #overlay.show.loss .modal{
    max-width: 100%;
    padding: 24px 20px;
  }
  .modal.win .modal-icon{
    animation: gentleBounce 1.2s ease infinite;
  }
  @keyframes gentleBounce{
    0%,100%{ transform: translateY(0); }
    50%{ transform: translateY(-6px); }
  }
  .modal-icon{
    font-size:52px;
    margin-bottom:10px;
    display:block;
  }
  .modal h2{
    font-family:'Jua', sans-serif;
    font-size:28px;
    margin: 0 0 8px;
    color: var(--heading);
  }
  .modal .answer{
    font-family: 'Jua', sans-serif;
    font-size: 36px;
    margin: 14px 0;
    letter-spacing:4px;
    color: var(--heading);
  }
  .modal button, #share-btn{
    /* app-buttons.css */
  }
  .modal-actions{
    /* app-buttons.css */
  }
  #share-btn.copied{
    border-color: var(--mint-btn);
    background: var(--mint);
    color: var(--correct-text);
  }
  #share-toast{
    display: block;
    font-size: 13px;
    color: var(--success-text);
    margin-top: 10px;
    min-height: 18px;
    opacity: 0;
    transition: opacity .25s ease;
  }
  #share-toast.show{ opacity: 1; }
  #modal-sub{ font-size:14px; color: var(--text-soft); }

  footer{
    margin-top: 16px;
    font-size:12px;
    color: var(--text-soft);
    text-align:center;
    line-height:1.6;
  }

  @media (max-width: 520px){
    :root{
      --syl-size: 54px;
      --board-gap: 6px;
      --row-gap: 8px;
      --jamo-font: 17px;
      --jamo-font-jong: 15px;
    }
    body{ padding: calc(12px + var(--safe-top)) 12px calc(16px + var(--safe-bottom)); }
    body:has(#menu-screen:not(.hidden)){ padding-top: 0; padding-left: 0; padding-right: 0; }
    .header{ gap: 10px; margin-bottom: 4px; }
    .seal{ width: 44px; height: 44px; font-size: 22px; }
    h1{ font-size: 28px; }
    .subtitle{ font-size: 13px; margin: 0 0 16px; }
    button.ghost{ font-size: 13px; padding: 7px 12px; }
    #board{ margin-bottom: 12px; }
    .jamo.empty{ font-size: 11px; }
    #input-row{ margin-bottom: 10px; gap: 8px; width: 100%; }
    #guess-input{
      flex: 1; min-width: 0; width: auto;
      font-size: 18px; padding: 11px 8px; letter-spacing: 4px;
    }
    #submit-btn{ font-size: 15px; padding: 0 18px; flex-shrink: 0; }
    #message{ min-height: 24px; font-size: 13px; margin-bottom: 10px; }
    #tracker{ padding: 10px 12px; }
    .tracker-label{ font-size: 11px; margin-bottom: 5px; }
    .tracker-row{ gap: 4px; margin-bottom: 8px; }
    .tkey{ width: 26px; height: 28px; font-size: 12px; border-radius: 8px; }
    .hint-dock-btn{ font-size: 11px; padding: 5px 8px; gap: 6px; min-height: 36px; max-height: 40px; }
    .hint-icon{ width: 24px; height: 24px; }
    .hi-tile{ font-size: 13px; }
    #token-counter{ font-size: 12px; }
    footer:not(.daily-cal-footer){ display: none; }
    .menu-tagline{ font-size: 14px; }
    .menu-tagline-ko{ font-size: 12px; margin-bottom: 18px; }
    .featured-continue-card{ padding: 18px 16px; }
    .featured-continue-title{ font-size: 22px; }
    .daily-challenge-card,
    .learning-mode-card{ padding: 8px 12px; min-height: 46px; }
    .mode-icon{ width: auto; height: auto; font-size: clamp(26px, 6.2vw, 32px); background: transparent; }
    .mode-name{ font-size: clamp(18px, 4.8vw, 22px); text-transform: uppercase; }
    .modal{ padding: 28px 22px; }
    .modal-icon{ font-size: 40px; }
    .modal h2{ font-size: 24px; }
    .modal .answer{ font-size: 30px; letter-spacing: 3px; }
  }

  @media (max-width: 380px){
    :root{
      --syl-size: 48px;
      --board-gap: 5px;
      --row-gap: 6px;
      --jamo-font: 15px;
      --jamo-font-jong: 13px;
    }
    .tkey{ width: 24px; height: 26px; font-size: 11px; }
  }

  #leaderboard-overlay{
    display: none !important;
  }

  .panel-modal h2{
    font-family: 'Jua', sans-serif;
    font-size: 22px;
    margin: 0 0 16px;
    text-align: center;
    color: var(--heading);
  }
  .leaderboard-list{
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .leaderboard-tabs{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 14px;
  }
  .leaderboard-tab{
    min-height: 40px;
    padding: 8px 10px;
    border-radius: 16px;
    border: 2px solid rgba(123, 207, 255, 0.35);
    background: rgba(0, 60, 72, 0.35);
    color: rgba(255, 255, 255, 0.8);
    font-family: 'Jua', sans-serif;
    font-size: 13px;
    cursor: pointer;
    box-shadow: none;
  }
  .leaderboard-tab.active{
    background: #FFCC33;
    border-color: #E6B82E;
    color: #ffffff;
    text-shadow: 0 2px 0 rgba(120, 80, 0, 0.45);
    box-shadow: 0 4px 0 #C4A82D;
  }
  .leaderboard-list li{
    display: grid;
    grid-template-columns: 28px 1fr auto;
    gap: 8px;
    align-items: center;
    padding: 10px 12px;
    background: rgba(0, 60, 72, 0.35);
    border: 1px solid rgba(123, 207, 255, 0.25);
    border-radius: var(--radius-sm);
    font-size: 14px;
  }
  .leaderboard-rank{
    font-family: 'Jua', sans-serif;
    font-size: 15px;
    color: rgba(255, 255, 255, 0.65);
    text-align: center;
  }
  .leaderboard-name{
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .leaderboard-list li.me{
    border-color: rgba(123, 207, 255, 0.55);

function decompose(syllable){
  const code = syllable.codePointAt(0) - 0xAC00;
  const choIdx = Math.floor(code / (21*28));
  const jungIdx = Math.floor((code % (21*28)) / 28);
  const jongIdx = code % 28;
  return { cho: CHO[choIdx], jung: JUNG[jungIdx], jong: JONG[jongIdx] };
}

function isHangulSyllable(ch){
  const c = ch.codePointAt(0);
  return c >= 0xAC00 && c <= 0xD7A3;
}

function wordToSlots(word){
  const cho=[], jung=[], jong=[];
  for(const ch of word){
    const d = decompose(ch);
    cho.push(d.cho); jung.push(d.jung); jong.push(d.jong);
  }
  return {cho, jung, jong};
}

function scoreCategory(guessArr, targetArr){
  const result = new Array(guessArr.length).fill('absent');
  const targetUsed = new Array(targetArr.length).fill(false);
  for(let i=0;i<guessArr.length;i++){
    if(guessArr[i] !== '' && guessArr[i] === targetArr[i]){
      result[i] = 'correct';
      targetUsed[i] = true;
    }
  }
  for(let i=0;i<guessArr.length;i++){
    if(result[i] === 'correct') continue;
    if(guessArr[i] === ''){ result[i] = (targetArr[i]==='') ? 'correct' : 'absent'; continue; }
    for(let j=0;j<targetArr.length;j++){
      if(!targetUsed[j] && targetArr[j] === guessArr[i]){
        result[i] = 'present';
        targetUsed[j] = true;
        break;
      }
    }
  }
  return result;
}

/**
 * Wordle-style scoring at syllable level (turn-based co-op mode only).
 * Does not replace jamo-level scoreCategory used elsewhere.
 *
 * @param {string[]} guessSyllables - complete syllable characters per slot
 * @param {string[]} targetSyllables - target word syllables (same length)
 * @returns {('correct'|'present'|'absent')[]} one status per guess position
 */
function scoreSyllables(guessSyllables, targetSyllables) {
  const result = new Array(guessSyllables.length).fill('absent');
  const targetUsed = new Array(targetSyllables.length).fill(false);

  for (let i = 0; i < guessSyllables.length; i++) {
    if (guessSyllables[i] !== '' && guessSyllables[i] === targetSyllables[i]) {
      result[i] = 'correct';
      targetUsed[i] = true;
    }
  }

  for (let i = 0; i < guessSyllables.length; i++) {
    if (result[i] === 'correct') continue;
    if (guessSyllables[i] === '') {
      result[i] = (targetSyllables[i] === '') ? 'correct' : 'absent';
      continue;
    }
    for (let j = 0; j < targetSyllables.length; j++) {
      if (!targetUsed[j] && targetSyllables[j] === guessSyllables[i]) {
        result[i] = 'present';
        targetUsed[j] = true;
        break;
      }
    }
  }

  return result;
}

/** Flatten 초성+받침 into one 자음 sequence (board order), score as one class */
function buildConsonantSequences(guessSlots, targetSlots){
  const guess = [];
  const target = [];
  for(let s = 0; s < state.wordLength; s++){
    guess.push(guessSlots.cho[s]);
    target.push(targetSlots.cho[s]);
    if(state.targetLayout[s].hasJong){
      guess.push(guessSlots.jong[s]);
      target.push(targetSlots.jong[s]);
    }
  }
  return { guess, target };
}

/** Score guess by 자음 / 모음 (not 초·중·종) */
function scoreWordGuess(guessSlots, targetSlots){
  const { guess: guessConsonants, target: targetConsonants } = buildConsonantSequences(guessSlots, targetSlots);
  const consonantScores = scoreCategory(guessConsonants, targetConsonants);
  const vowelScores = scoreCategory(guessSlots.jung, targetSlots.jung);

  const choScore = [];
  const jungScore = vowelScores.slice();
  const jongScore = [];
  let ci = 0;
  for(let s = 0; s < state.wordLength; s++){
    choScore[s] = consonantScores[ci++];
    jongScore[s] = state.targetLayout[s].hasJong ? consonantScores[ci++] : '';
  }
  return { choScore, jungScore, jongScore };
}

function getTargetConsonantSet(){
  const set = new Set();
  if(!state.targetSlots) return set;
  for(let s = 0; s < state.wordLength; s++){
    set.add(state.targetSlots.cho[s]);
    if(state.targetSlots.jong[s]) set.add(state.targetSlots.jong[s]);
  }
  return set;
}

const TRACKER_RANK = { absent: 0, present: 1, correct: 2 };

function migrateTracker(tracker){
  if(!tracker || typeof tracker !== 'object') return {};
  const hasLegacy = Object.keys(tracker).some((k) => /^(cho|jung|jong):/.test(k));
  if(!hasLegacy) return tracker;
  const out = {};
  for(const [key, val] of Object.entries(tracker)){
    let nk = key;
    if(key.startsWith('cho:') || key.startsWith('jong:')) nk = 'consonant:' + key.slice(key.indexOf(':') + 1);
    else if(key.startsWith('jung:')) nk = 'vowel:' + key.slice(key.indexOf(':') + 1);
    const prev = out[nk];
    if(!prev || TRACKER_RANK[val] > TRACKER_RANK[prev]) out[nk] = val;
  }
  return out;
}

function hashString(str){
  let h = 0;
  for(let i = 0; i < str.length; i++){
    h = ((h << 5) - h) + str.charCodeAt(i);
    h |= 0;
  }
  return Math.abs(h);
}

function getTodayKey(){
  return new Intl.DateTimeFormat('en-CA', {
    timeZone: DAILY_TZ,
    year: 'numeric',
    month: '2-digit',
    day: '2-digit'
  }).format(new Date());
}

function getDayNumber(){
  const today = getTodayKey();
  const launchMs = new Date(DAILY_LAUNCH + 'T00:00:00+09:00').getTime();
  const todayMs = new Date(today + 'T00:00:00+09:00').getTime();
  return Math.floor((todayMs - launchMs) / 86400000) + 1;
}

function dailyStorageKey(wordLength){
  return 'jamodeul-daily-' + getTodayKey() + '-' + wordLength;
}

function loadDailySaved(wordLength){
  try {
    const raw = localStorage.getItem(dailyStorageKey(wordLength));
    return raw ? JSON.parse(raw) : null;
  } catch {
    return null;
  }
}

function saveDailyProgress(){
  if(state.gameMode !== 'daily') return;
  if(state.won && state.dailyStartedAt != null && state.elapsedMs == null){
    state.elapsedMs = Math.max(0, Date.now() - state.dailyStartedAt);
  }
  const payload = {
    guesses: state.guesses,
    over: state.over,
    won: state.won,
    tracker: state.tracker,
    hintSyllables: state.hintSyllables,
    hintDefinitionUsed: state.hintDefinitionUsed,
    hintElimUsed: state.hintElimUsed,
    dailyStartedAt: state.dailyStartedAt,
    elapsedMs: state.elapsedMs
  };
  localStorage.setItem(dailyStorageKey(state.wordLength), JSON.stringify(payload));
}

function getDailyElapsedMs(){
  if(state.gameMode !== 'daily') return null;
  if(state.elapsedMs != null) return state.elapsedMs;
  if(state.dailyStartedAt != null) return Math.max(0, Date.now() - state.dailyStartedAt);

}

function newGame(){
  state.target = pickWord();
  state.targetSlots = wordToSlots(state.target);
  state.targetLayout = state.targetSlots.cho.map((_, s) => ({
    hasJong: state.targetSlots.jong[s] !== '',
    vowelType: vowelLayout(state.targetSlots.jung[s])
  }));
  state.guesses = [];
  state.over = false;
  state.won = false;
  state.animating = false;
  state.pendingRow = null;
  state.tracker = {};
  state.hintSyllables = [];
  state.hintDefinitionUsed = false;
  state.hintElimUsed = false;

  if(state.gameMode === 'daily'){
    const saved = loadDailySaved(state.wordLength);
    state.dailyStartedAt = null;
    state.elapsedMs = null;
    if(saved){
      state.guesses = saved.guesses || [];
      state.over = !!saved.over;
      state.won = !!saved.won;
      state.tracker = migrateTracker(saved.tracker || {});
      state.hintSyllables = saved.hintSyllables || [];
      state.hintDefinitionUsed = !!saved.hintDefinitionUsed;
      state.hintElimUsed = !!saved.hintElimUsed;
      state.dailyStartedAt = saved.dailyStartedAt || null;
      state.elapsedMs = saved.elapsedMs ?? null;
    }
    if(!state.over && state.dailyStartedAt == null){
      state.dailyStartedAt = Date.now();
    }
  }

  document.getElementById('message').textContent = '';
  document.getElementById('message').classList.remove('show');
  document.getElementById('guess-input').value = '';
  document.getElementById('guess-input').disabled = state.over;
  document.getElementById('submit-btn').disabled = state.over;
  document.getElementById('submit-btn').classList.remove('submitting');
  document.getElementById('overlay').classList.remove('show', 'loss');
  document.getElementById('modal').classList.remove('win');
  document.getElementById('share-btn').classList.remove('copied');
  document.getElementById('share-toast').classList.remove('show');
  document.body.classList.remove('overlay-open');
  renderBoard();
  renderTracker();
  updateHintDock();

  if(state.gameMode === 'daily' && state.over){
    setTimeout(() => showOverlay(state.won), 100);
  }
}

function buildSyllableTile(row, syl, guess, isPending){
  const { hasJong, vowelType } = state.targetLayout[syl];
  const sylDiv = document.createElement('div');
  sylDiv.className = 'syl' + (hasJong ? ' syl-triple' : ' syl-dual');

  const choCell = makeJamoCell(row, syl, 'cho');
  const jungCell = makeJamoCell(row, syl, 'jung');

  if(guess){
    choCell.textContent = guess.cho[syl];
    jungCell.textContent = guess.jung[syl];
    applyJamoCellState(choCell, guess.choScore[syl], isPending);
    applyJamoCellState(jungCell, guess.jungScore[syl], isPending);
  }

  if(vowelType === 'stack'){
    const choRow = document.createElement('div');
    choRow.className = 'syl-row';
    choRow.appendChild(choCell);
    const jungRow = document.createElement('div');
    jungRow.className = 'syl-row';
    jungRow.appendChild(jungCell);
    sylDiv.appendChild(choRow);
    sylDiv.appendChild(jungRow);
  } else {
    const topRow = document.createElement('div');
    topRow.className = 'syl-row';
    topRow.appendChild(choCell);
    topRow.appendChild(jungCell);
    sylDiv.appendChild(topRow);
  }

  if(hasJong){
    const jongCell = makeJamoCell(row, syl, 'jong');
    if(guess) jongCell.textContent = guess.jong[syl];
    applyJamoCellState(jongCell, guess ? guess.jongScore[syl] : null, isPending);
    const jongRow = document.createElement('div');
    jongRow.className = 'syl-row syl-row-jong';
    jongRow.appendChild(jongCell);
    sylDiv.appendChild(jongRow);
  }

  return sylDiv;
}

function renderBoard(){
  const board = document.getElementById('board');
  board.innerHTML = '';
  for(let r=0;r<state.maxGuesses;r++){
    const rowDiv = document.createElement('div');
    rowDiv.className = 'row';
    if(r < state.guesses.length) rowDiv.dataset.guess = String(r);
    const guess = state.guesses[r];
    const isPending = state.pendingRow === r;

    for(let s=0;s<state.wordLength;s++){
      rowDiv.appendChild(buildSyllableTile(r, s, guess, isPending));
    }
    board.appendChild(rowDiv);
  }
}

async function revealRow(rowIdx, guess){
  for(let s=0;s<state.wordLength;s++){
    for(const part of getDisplayParts(guess, s)){
      const cell = getJamoCell(rowIdx, s, part);
      if(!cell) continue;
      const scoreKey = part + 'Score';
      const score = guess[scoreKey][s];

      cell.classList.remove('pending');
      cell.classList.add('reveal-' + rowIdx, score);
      if(score === 'correct' || score === 'present') cell.classList.add('spark');
      window.SoundEffects?.flip?.(score);

      await sleep(REVEAL_STAGGER);
    }
  }
  await sleep(350);
}

function renderHintPanel(){
  const panel = document.getElementById('hint-panel');
  const content = document.getElementById('hint-content');
  const hasHints = state.hintSyllables.length > 0 || state.hintDefinitionUsed;
  if(!hasHints){
    panel.classList.remove('show');
    content.innerHTML = '';
    return;
  }
  panel.classList.add('show');
  let html = '';

  if(state.hintDefinitionUsed){
    const def = DEFINITIONS[state.target] || wt('noDefinition');
    html += '<div class="hint-line hint-def">' + def + '</div>';
  }

  const sorted = [...state.hintSyllables].sort((a,b)=>a-b);
  sorted.forEach(s => {
    const cho = state.targetSlots.cho[s];
    const jung = state.targetSlots.jung[s];
    const jong = state.targetSlots.jong[s];
    const parts = cho + (jong ? ' + ' + jung + ' + ' + jong : ' + ' + jung);
    html += '<div class="hint-line">'
      + wt('syllableHintLine', { n: s + 1, char: state.target[s], parts })
      + '</div>';
  });

  content.innerHTML = html;
}

function updateHintDock(){
  const sylBtn = document.getElementById('syl-hint-btn');
  const elimBtn = document.getElementById('elim-hint-btn');
  const defBtn = document.getElementById('def-hint-btn');
  const base = state.over || state.animating;
  sylBtn.disabled = base || getHintTokenCount() < 1 || state.hintSyllables.length >= state.wordLength;
  elimBtn.disabled = base || getHintTokenCount() < 1 || state.hintElimUsed;
  defBtn.disabled = base || getHintTokenCount() < 2 || state.hintDefinitionUsed;
  document.getElementById('token-count').textContent = getHintTokenCount();
  renderHintPanel();
  updateExtraGuessTokenUI();
}

function openSyllablePicker(){
  if(state.over || state.animating || getHintTokenCount() < 1) return;
  const btnsDiv = document.getElementById('syl-picker-btns');
  btnsDiv.innerHTML = '';
  for(let i = 0; i < state.wordLength; i++){
    const btn = document.createElement('button');
    btn.className = 'syl-pick-btn' + (state.hintSyllables.includes(i) ? ' revealed' : '');
    btn.textContent = wt('letterCount', { n: i + 1 });
    if(!state.hintSyllables.includes(i)){
      btn.addEventListener('click', () => { useSyllableHint(i); closeSyllablePicker(); });
    }
    btnsDiv.appendChild(btn);
  }
  document.getElementById('syl-picker').classList.add('show');
}

function closeSyllablePicker(){
  document.getElementById('syl-picker').classList.remove('show');
}

function useSyllableHint(sylIdx){
  if(getHintTokenCount() < 1 || state.hintSyllables.includes(sylIdx)) return;
  if(!spendHintTokens(1)) return;
  state.hintSyllables.push(sylIdx);
  updateHintDock();
  if(state.gameMode === 'daily') saveDailyProgress();
  setMessage(wt('syllableHintRevealed', { n: sylIdx + 1 }));
}

function isJamoInTargetCategory(cat, jamo){
  if(!state.targetSlots) return true;
  if(cat === 'consonant') return getTargetConsonantSet().has(jamo);
  if(cat === 'vowel') return state.targetSlots.jung.includes(jamo);
  return true;
}

function useEliminationHint(){
  if(getHintTokenCount() < 1 || state.hintElimUsed) return;
  if(!spendHintTokens(1)) return;
  const candidates = [];
  const cats = [
    { list: CONSONANT_ALL, cat: 'consonant' },
    { list: VOWEL_ALL, cat: 'vowel' },
  ];
  for(const { list, cat } of cats){
    for(const jamo of list){
      if(!isJamoInTargetCategory(cat, jamo)){
        const key = cat + ':' + jamo;
        if(!state.tracker[key]){
          candidates.push({ cat, jamo, key });
        }
      }
    }
  }
  // Shuffle and pick up to 7
  for(let i = candidates.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
  }
  const picks = candidates.slice(0, 7);
  picks.forEach(p => { state.tracker[p.key] = 'absent'; });
  state.hintElimUsed = true;
  renderTracker(new Set(picks.map(p => p.key)));
  updateHintDock();
  if(state.gameMode === 'daily') saveDailyProgress();
  setMessage(wt('elimHintUsed', { count: picks.length }));
}

function useDefinitionHint(){
  if(getHintTokenCount() < 2 || state.hintDefinitionUsed) return;
  if(!spendHintTokens(2)) return;
  state.hintDefinitionUsed = true;
  updateHintDock();
  if(state.gameMode === 'daily') saveDailyProgress();
  setMessage(wt('defHintUsed'));
}

function renderTracker(updatedKeys){
  const consonantRow = document.getElementById('consonant-row');
  const vowelRow = document.getElementById('vowel-row');
  consonantRow.innerHTML = '';
  vowelRow.innerHTML = '';

  function addKey(container, cat, jamo){
    const el = document.createElement('div');
    el.className = 'tkey';
    const key = cat + ':' + jamo;
    const st = state.tracker[key];
    if(st) el.classList.add(st);
    if(!isJamoInTargetCategory(cat, jamo)) el.classList.add('unused');
    if(updatedKeys && updatedKeys.has(key)) el.classList.add('updated');
    el.textContent = jamo;
    container.appendChild(el);
  }

  CONSONANT_ALL.forEach((j) => addKey(consonantRow, 'consonant', j));
  VOWEL_ALL.forEach((j) => addKey(vowelRow, 'vowel', j));
}

function updateTracker(cat, arr, scores){
  const rank = TRACKER_RANK;
  const updated = new Set();
  arr.forEach((jamo, i) => {
    if(jamo === '') return;
    const key = cat + ':' + jamo;
    const newScore = scores[i];
    const old = state.tracker[key];
    if(!old || rank[newScore] > rank[old]){
      state.tracker[key] = newScore;
      updated.add(key);
    }
  });
  return updated;
}

function updateTrackerFromWordScores(guessSlots, scores){
  const updated = new Set();
  const { guess: guessConsonants } = buildConsonantSequences(guessSlots, state.targetSlots);
  const consonantScores = [];
  for(let s = 0; s < state.wordLength; s++){
    consonantScores.push(scores.choScore[s]);
    if(state.targetLayout[s].hasJong) consonantScores.push(scores.jongScore[s]);
  }
  updateTracker('consonant', guessConsonants, consonantScores).forEach((k) => updated.add(k));
  updateTracker('vowel', guessSlots.jung, scores.jungScore).forEach((k) => updated.add(k));
  return updated;
}

function launchConfetti(){
  if(window.UserPreferences?.shouldReduceMotion?.()) return;
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const colors = ['#A8E6C4','#FFE0A8','#FFB8D0','#C8E6FF','#E8DEFF','#FFD0A8'];
  const pieces = Array.from({length: 120}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height * 0.5 - canvas.height * 0.5,
    w: 6 + Math.random() * 8,
    h: 4 + Math.random() * 6,
    color: colors[Math.floor(Math.random() * colors.length)],
    rot: Math.random() * 360,
    spin: (Math.random() - 0.5) * 12,
    vy: 2 + Math.random() * 4,
    vx: (Math.random() - 0.5) * 3,
    opacity: 1
  }));

  let frame = 0;
  const maxFrames = 140;

  function draw(){
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot * Math.PI / 180);
      ctx.globalAlpha = p.opacity;
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
      p.x += p.vx;
      p.y += p.vy;
      p.rot += p.spin;
      p.vy += 0.08;
    });
    frame++;
    if(frame < maxFrames) requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  draw();
}

function buildShareText(){
  const n = state.wordLength;
  const won = state.won;
  const attempts = won ? state.guesses.length : 'X';
  let header;
  if(state.gameMode === 'daily'){
    header = wt('shareHeaderDaily', { day: getDayNumber(), n, attempts });
  } else {
    header = wt('shareHeaderPractice', { n, attempts });
  }
  const grid = state.guesses.map(g => guessToShareRow(g)).join('\n');
  return header + '\n\n' + grid + '\n\n' + wt('shareFooter');
}

function guessToShareRow(guess){
  const syllables = [];
  for(let s = 0; s < state.wordLength; s++){
    const parts = getDisplayParts(guess, s);
    const jamos = parts.map(part => SHARE_EMOJI[guess[part + 'Score'][s]] || '⬛');
    syllables.push(jamos.join(''));
  }
  return syllables.join(' ');
}

async function copyShareResult(){
  const text = buildShareText();
  const toast = document.getElementById('share-toast');
  const btn = document.getElementById('share-btn');
  try {
    await navigator.clipboard.writeText(text);
  } catch {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  }
  btn.classList.add('copied');
  btn.textContent = wt('copied');
  toast.textContent = wt('copiedToast');
  toast.classList.add('show');
  setTimeout(() => {
    btn.classList.remove('copied');
    btn.textContent = wt('shareResult');
    toast.classList.remove('show');
  }, 2200);
}

let extraLifeTimer = null;
const EXTRA_LIFE_MS = 5000;
const RING_CIRC = 113; // 2π × r=18 ≈ 113

function showExtraLifePopup(){
  if(extraLifeTimer) { clearInterval(extraLifeTimer); extraLifeTimer = null; }
  const popup = document.getElementById('extra-life');
  const ring = document.getElementById('el-ring-fill');
  const sub = popup.querySelector('.el-sub');
  if(sub) sub.textContent = wt('extraLifeSub');
  ring.style.strokeDashoffset = '0';
  popup.classList.add('show');
  updateExtraGuessTokenUI();

  const start = performance.now();
  extraLifeTimer = setInterval(() => {
    const elapsed = performance.now() - start;
    const progress = Math.min(elapsed / EXTRA_LIFE_MS, 1);
    ring.style.strokeDashoffset = String(RING_CIRC * progress);
    if(progress >= 1){
      clearInterval(extraLifeTimer);
      extraLifeTimer = null;
      const tokens = window.ShopService?.getItemCount?.('extraGuess') || 0;
      if(tokens > 0){
        if(sub) sub.textContent = window.I18n?.t('shop.extraGuessPrompt') || wt('extraLifeSub');
        updateExtraGuessTokenUI();
      } else {
        popup.classList.remove('show');
        document.getElementById('extra-guess-token-btn')?.classList.add('hidden');
        setTimeout(() => showOverlay(false), 300);
      }
    }
  }, 33);
}

function dismissExtraLifePopup(){
  if(extraLifeTimer){ clearInterval(extraLifeTimer); extraLifeTimer = null; }
  document.getElementById('extra-life').classList.remove('show');
  document.getElementById('extra-guess-token-btn')?.classList.add('hidden');
}

function useExtraGuessWithToken(){
  if(!window.ShopService?.spendExtraGuessToken?.()) return;
  dismissExtraLifePopup();
  useExtraLife();
}

function useExtraLife(){
  dismissExtraLifePopup();
  state.over = false;
  state.maxGuesses++;
  const input = document.getElementById('guess-input');
  const submitBtn = document.getElementById('submit-btn');
  input.disabled = false;
  submitBtn.disabled = false;
  input.value = '';
  input.focus();
  updateHintDock();
  setMessage(wt('extraLifeUsed'), 'success');
}

function formatDailyTime(ms){
  const sec = Math.max(0, Math.floor(ms / 1000));
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  if(m > 0) return `${m}:${String(s).padStart(2, '0')}`;
  return wt('timeSec', { s });
}

function showOverlay(won){
  state.won = won;
  const overlay = document.getElementById('overlay');
  const modal = document.getElementById('modal');
  const modalBtn = document.getElementById('modal-btn');
  document.getElementById('modal-icon').textContent = won ? '🎉' : '💧';
  document.getElementById('modal-title').textContent = won ? wt('modalWin') : wt('modalLoss');
  document.getElementById('modal-answer').textContent = state.target;
  document.getElementById('modal-sub').textContent = won
    ? (state.gameMode === 'daily' && getDailyElapsedMs() != null
        ? wt('modalWinDaily', { count: state.guesses.length, time: formatDailyTime(getDailyElapsedMs()) })
        : wt('modalWinSimple', { count: state.guesses.length }))
    : wt('modalLossSub');
  modalBtn.textContent = wt('modalToMenu');
  document.getElementById('share-btn').textContent = wt('shareResult');
  document.getElementById('share-btn').classList.remove('copied');
  document.getElementById('share-toast').classList.remove('show');
  modal.classList.toggle('win', won);
  overlay.classList.toggle('loss', !won);
  window.SoundEffects?.[won ? 'win' : 'lose']?.();
  overlay.classList.remove('show');
  window.scrollTo(0, 0);
  document.documentElement.scrollTop = 0;
  document.body.scrollTop = 0;
  document.body.classList.add('overlay-open');
  requestAnimationFrame(() => overlay.classList.add('show'));
  if(won) launchConfetti();
  if(state.gameMode === 'daily') saveDailyProgress();
  if(state.gameMode === 'daily') FirebaseSocial?.onDailyGameEnd?.(won);
}

async function submitGuess(){
  if(state.over || state.animating) return;
  const input = document.getElementById('guess-input');
  const submitBtn = document.getElementById('submit-btn');
  const raw = input.value.trim();

  const n = state.wordLength;
  const example = n === 2 ? wt('example2') : wt('example3');
  if(raw.length !== n || ![...raw].every(isHangulSyllable)){
    setMessage(wt('invalidInput', { n, example }), 'error');
    shakeInput();
    window.SoundEffects?.invalid?.();
    return;
  }

  state.animating = true;
  submitBtn.classList.add('submitting');
  input.disabled = true;
  submitBtn.disabled = true;

  const slots = wordToSlots(raw);
  const { choScore, jungScore, jongScore } = scoreWordGuess(slots, state.targetSlots);

  const guessData = {
    word: raw,
    cho: slots.cho, jung: slots.jung, jong: slots.jong,
    choScore, jungScore, jongScore
  };

  const rowIdx = state.guesses.length;
  state.guesses.push(guessData);
  state.pendingRow = rowIdx;
  renderBoard();

  const rowEl = document.getElementById('board').children[rowIdx];
  if(rowEl) rowEl.classList.add('row-enter');

  input.value = '';
  setMessage('');

  await revealRow(rowIdx, guessData);

  state.pendingRow = null;
  renderBoard();

  const updatedKeys = updateTrackerFromWordScores(slots, { choScore, jungScore, jongScore });
  renderTracker(updatedKeys);

  state.animating = false;
  submitBtn.classList.remove('submitting');
  updateHintDock();

  const won = raw === state.target;
  if(won){
    state.over = true;
    state.won = true;
    if(state.gameMode === 'daily') saveDailyProgress();
    const usedHint = state.hintSyllables.length > 0 || state.hintDefinitionUsed || state.hintElimUsed;
    if(window.XpService?.awardAndCelebrate){
      XpService.awardAndCelebrate({
        mode: 'dailyWordle',
        wordId: `daily-${getTodayKey()}`,
        usedHint,
        isDailyChallenge: true,
      });
    }
    setTimeout(() => showOverlay(true), 200);
    return;
  }
  if(state.guesses.length >= state.maxGuesses){
    state.over = true;
    state.won = false;
    if(state.gameMode === 'daily') saveDailyProgress();
    window.scrollTo(0, 0);
    setTimeout(() => showExtraLifePopup(), 200);
    return;
  }

  if(state.gameMode === 'daily') saveDailyProgress();

  input.disabled = false;
  submitBtn.disabled = false;
  input.focus();
}
