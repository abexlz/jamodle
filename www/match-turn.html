<!DOCTYPE html>

<script>
(function(){
  try {
    var p = JSON.parse(localStorage.getItem('jamodeul-preferences') || '{}');
    var theme = p.theme || localStorage.getItem('jamodeul-theme') || 'system';
    var resolved = theme;
    if (theme === 'system' || (theme !== 'light' && theme !== 'dark')) {
      resolved = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    document.documentElement.setAttribute('data-theme', resolved);
    if (p.reduceMotion) document.documentElement.classList.add('reduce-motion');
    if (p.highContrast) document.documentElement.classList.add('high-contrast');
    if (p.largeText) document.documentElement.classList.add('large-text');
    document.documentElement.lang = p.language === 'ko' ? 'ko' : 'en';
    document.documentElement.setAttribute('data-font-pack', p.devFontPack === 'jua' ? 'jua' : 'junegull');
  } catch (e) {}
})();
</script>

  /* Turn dock jamo bank — square tiles (match-turn.html only) */
  body.match-race-page.match-turn-page .jamo-bank--turn {
    flex: 0 0 auto !important;
    flex-shrink: 0 !important;
    min-height: calc(var(--turn-dock-tile-size, var(--tile-size, 44px)) + 16px) !important;
    height: auto !important;
    max-height: none !important;
    overflow-y: visible !important;
    align-items: flex-start !important;
    align-content: flex-start !important;
    flex-wrap: wrap !important;
  }

  body.match-race-page.match-turn-page .jamo-bank--turn.jamo-bank--wrap12 {
    flex-wrap: wrap !important;
    align-content: flex-start !important;
    align-items: flex-start !important;
    min-height: calc(var(--turn-dock-tile-size, var(--tile-size, 44px)) + 16px) !important;
    overflow-x: hidden !important;
    overflow-y: visible !important;
  }

  body.match-race-page.match-turn-page .jamo-bank--turn > .jamo-tile:not(.in-zone) {
    --dock-tile-local: var(--turn-dock-tile-size, var(--dock-tile-size, 44px));
    flex: 0 0 var(--dock-tile-local) !important;
    width: var(--dock-tile-local) !important;
    height: var(--dock-tile-local) !important;
    min-width: var(--dock-tile-local) !important;
    max-width: var(--dock-tile-local) !important;
    min-height: var(--dock-tile-local) !important;
    max-height: var(--dock-tile-local) !important;
    aspect-ratio: 1 / 1 !important;
    border-radius: 10px !important;
  }

  body.match-race-page.match-turn-page .race-app {
    flex: 1;
    min-height: 0;
    max-height: none;
    height: auto;
    overflow: hidden;
    gap: 6px;
    width: 100%;
    max-width: 480px;
    margin-left: auto;
    margin-right: auto;
    min-width: 0;
    box-sizing: border-box;
  }

  body.match-race-page.match-turn-page .race-header {
    flex-shrink: 0;
    margin-bottom: 0;
  }

  body.match-race-page.match-turn-page .race-header h1 {
    font-size: 18px;
  }

  body.match-race-page.match-turn-page #race-turn-previous {
    flex-shrink: 1;

  body.match-race-page.match-turn-page #match-opp-area { display: none !important; }
  body.match-race-page.match-turn-page .game-feedback { display: none !important; }
  body.match-race-page.match-turn-page .blocks-area .section-label,

  body.match-race-page.match-turn-page .live-stats { display: none !important; }

  .match-race-game .match-header { margin-bottom: 8px; }
  body.match-race-page.match-turn-page .race-main {

  body.match-race-page.match-turn-page .race-turn-mine {

    max-width: 100%;
    min-width: 0;
    box-sizing: border-box;
  }
  body.match-race-page.match-turn-page #match-app > .match-header { display: none; }
