<!DOCTYPE html>
<html lang="ko">
<head>
<script>
(function(){
  try {
    var p = JSON.parse(localStorage.getItem('jamodeul-preferences') || '{}');
    var theme = p.theme || localStorage.getItem('jamodeul-theme') || 'system';
    var resolved = theme;
    if (theme === 'system' || (theme !== 'light' && theme !== 'dark')) {
      resolved = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    document.documentElement.setAttribute('data-theme', resolved);
    if (p.reduceMotion) document.documentElement.classList.add('reduce-motion');
    if (p.highContrast) document.documentElement.classList.add('high-contrast');
    if (p.largeText) document.documentElement.classList.add('large-text');
    if (p.tapToPlace) document.documentElement.classList.add('tap-to-place');
    document.documentElement.lang = p.language === 'ko' ? 'ko' : 'en';
    document.documentElement.setAttribute('data-font-pack', p.devFontPack === 'jua' ? 'jua' : 'junegull');
  } catch (e) {}
})();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Korean Match — 자모들</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/app-preferences.css">
<link rel="stylesheet" href="css/app-buttons.css?v=10">
<style>
  :root {
    --bg: #FFF8F5;
    --card: #FFFFFF;
    --text: #5D6470;
    --text-soft: #9AA3AD;
    --heading: #7B8FD4;
    --pink: #FFD6E8;
    --pink-btn: #FFB8D0;
    --blue: #C8E6FF;
    --blue-btn: #A8D4F5;
    --lavender: #E8DEFF;
    --lavender-btn: #CFC0F5;
    --mint: #C8F0E0;
    --mint-btn: #98DDB8;
    --yellow: #FFF6C8;
    --yellow-btn: #FFEAA0;
    --peach: #FFE8D4;
    --peach-btn: #FFD0A8;
    --correct: #A8E6C4;
    --correct-text: #3A7A58;
    --error-bg: #FFE8E5;
    --error-text: #D47870;
    --error-border: #FFB0A8;
    --success-bg: #E4F8EC;
    --success-text: #4A9A6A;
    --info-bg: #EEF4FF;
    --info-text: #6B7FD4;
    --border: #E8E4E0;
    --border-soft: #F0ECE8;
    --zone-bg: #FEFCFB;
    --shadow: 0 4px 14px rgba(93, 100, 112, 0.08);
    --shadow-sm: 0 2px 8px rgba(93, 100, 112, 0.06);
    --shadow-tile: 0 3px 0 rgba(93, 100, 112, 0.1);
    --overlay-scrim: rgba(255, 248, 245, 0.92);
    --block-size: clamp(100px, 26vw, 130px);
    --tile-size: clamp(52px, 14vw, 68px);
    --jamo-glyph-ratio: 0.5;
    --jamo-dock-glyph-ratio: 0.9;
    --jamo-in-zone-glyph-ratio: 0.936;
    --drop-zone-guide-ratio: 0.6;
    --drop-zone-guide-ratio-en: 0.39;
    --drop-zone-guide-ratio-cho-en: 0.22;
    --drop-zone-guide-ratio-vowel-jong-en: 0.29;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  [data-theme="dark"] {
    --bg: #1A1D28;
    --card: #2A2E3E;
    --text: #E4E8F0;
    --text-soft: #9AA3B8;
    --heading: #B8C4F0;
    --pink: #4A3545;
    --pink-btn: #6B4558;
    --blue: #2A3D52;
    --blue-btn: #3D5470;
    --lavender: #3A3555;
    --lavender-btn: #504878;
    --mint: #2A4038;
    --mint-btn: #3D5A4E;
    --yellow: #454028;
    --yellow-btn: #5A5238;
    --peach: #453830;
    --peach-btn: #5A4838;
    --correct: #3D6B52;
    --correct-text: #A8E6C4;
    --error-bg: #4A3035;
    --error-text: #FFB0A8;
    --error-border: #8B5050;
    --success-bg: #2A4038;
    --success-text: #A8E6C4;
    --info-bg: #2A3450;
    --info-text: #B0BCF0;
    --border: #3A3E50;
    --border-soft: #323648;
    --zone-bg: #252836;
    --overlay-scrim: rgba(18, 20, 28, 0.92);
    --shadow: 0 4px 14px rgba(0, 0, 0, 0.25);
    --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.2);
    --shadow-tile: 0 3px 0 rgba(0, 0, 0, 0.2);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }

  body {
    margin: 0;
    min-height: 100dvh;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text);
    padding: calc(16px + var(--safe-top)) 16px calc(24px + var(--safe-bottom));
    overflow-x: hidden;
  }

  #match-app {
    max-width: 520px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .match-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .back-link {
    /* app-buttons.css */
  }

  .title-block { flex: 1; text-align: center; min-width: 0; }

  .title-block h1 {
    font-family: 'Jua', 'Noto Sans KR', sans-serif;
    font-size: clamp(22px, 5.5vw, 30px);
    margin: 0;
    color: var(--heading);
    line-height: 1.15;
  }

  .title-block p {
    margin: 4px 0 0;
    font-size: 13px;
    color: var(--text-soft);
  }

  .word-badge {
    background: var(--yellow);
    border: 2px solid var(--yellow-btn);
    border-radius: 999px;
    padding: 8px 12px;
    font-family: 'Jua', sans-serif;
    font-size: 13px;
    white-space: nowrap;
    box-shadow: var(--shadow-sm);
  }

  .streak-badge {
    background: var(--peach);
    border: 2px solid var(--peach-btn);
    border-radius: 999px;
    padding: 8px 12px;
    font-family: 'Jua', sans-serif;
    font-size: 14px;
    white-space: nowrap;
    box-shadow: var(--shadow-sm);
  }

  .streak-badge.daily-badge {
    background: var(--mint);
    border-color: var(--mint-btn);
    font-size: 13px;
  }

  .learning-streak-bar {
    background: var(--peach);
    border: 2px solid var(--peach-btn);
    border-radius: 18px;
    padding: 12px 16px;
    text-align: center;
    box-shadow: var(--shadow-sm);
    margin-bottom: 4px;
  }

  .learning-streak-bar .streak-headline {
    font-family: 'Jua', sans-serif;
    font-size: clamp(16px, 4vw, 18px);
    color: var(--heading);
    margin: 0;
  }

  .learning-streak-bar .streak-progress {
    font-size: 13px;
    color: var(--text-soft);
    margin-top: 4px;
  }

  .learning-streak-bar .streak-progress.saved {
    color: var(--success-text);
    font-weight: 600;
  }

  .live-stats {
    display: flex;
    justify-content: center;
    gap: 20px;
    font-size: 14px;
    color: var(--text-soft);
    font-weight: 500;
  }

  .live-stat {
    background: var(--card);
    border: 2px solid var(--border-soft);
    border-radius: 999px;
    padding: 6px 14px;
    min-width: 72px;
    text-align: center;
  }

  .hint-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    background: var(--card);
    border: 2px solid var(--border-soft);
    border-radius: 20px;
    padding: 22px 20px;
    box-shadow: var(--shadow-sm);
    text-align: center;
    animation: popIn .4s ease both;
  }

  .hint-mystery {
    font-family: 'Jua', sans-serif;
    font-size: clamp(28px, 7vw, 36px);
    color: var(--text-soft);
    margin: 0;
    letter-spacing: 0.15em;
  }

  .hint-letters {
    display: flex;
    justify-content: center;
    gap: clamp(10px, 3vw, 18px);
  }

  .hint-letter {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: clamp(44px, 11vw, 56px);
    height: clamp(44px, 11vw, 56px);
    font-family: 'Jua', sans-serif;
    font-size: clamp(24px, 6vw, 32px);
    color: var(--text-soft);
    background: var(--zone-bg);
    border: 2px dashed var(--border);
    border-radius: 14px;
    perspective: 400px;
    transition: color .2s, background .2s;
  }

  .hint-letter.revealed {
    color: var(--heading);
    background: var(--card);
    border-style: solid;
    border-color: var(--mint-btn);
  }

  .hint-letter.hint-flip {
    animation: hintFlip .42s ease both;
  }

  @keyframes hintFlip {
    0% { transform: rotateX(0deg); }
    49% { transform: rotateX(-90deg); opacity: .4; }
    50% { transform: rotateX(-90deg); opacity: .4; }
    100% { transform: rotateX(0deg); opacity: 1; }
  }

  .hint-prompt {
    margin: 0;
    font-size: 14px;
    color: var(--text-soft);
  }

  .section-label {
    font-family: 'Jua', sans-serif;
    font-size: 16px;
    color: var(--heading);
    margin: 0 0 12px;
    text-align: center;
  }

  .syllable-blocks-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: clamp(12px, 3vw, 20px);
  }

  /* ── SyllableBlock layout (sketch reference) ── */
  .syllable-block {
    position: relative;
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 18px;
    padding: 10px;
    box-shadow: var(--shadow-sm);
    border-radius: 16px 20px 18px 22px / 20px 16px 22px 18px;
    display: flex;
    align-items: stretch;
    justify-content: stretch;
    aspect-ratio: 1 / 1.12;
    min-width: 0;
  }

  .syllable-grid {
    display: grid;
    grid-template-columns: 1fr 0.461fr;
    grid-template-rows: var(--syl-grid-row-cho, 0.92fr) var(--syl-grid-row-jungH, 0.624fr) var(--syl-grid-row-jong, 0.81fr);
    gap: 6px;
    flex: 1;
    width: 100%;
    height: 100%;
    min-height: 0;
    min-width: 0;
  }

  .drop-zone {
    background: var(--zone-bg);
    border: 2px dashed var(--border);
    border-radius: 12px 14px 13px 15px / 14px 12px 15px 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    min-height: 0;
    transition: border-color .2s, background .2s, transform .15s;
    touch-action: manipulation;
  }

  .drop-zone[data-zone="cho"] {
    grid-column: 1;
    grid-row: 1;
    min-height: 0;
  }

  .drop-zone[data-zone="jungH"] {
    grid-column: 1;
    grid-row: 2;
    min-height: 0;
  }

  .vowel-column {
    grid-column: 2;
    grid-row: 1 / 3;
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-height: 0;
    height: 100%;
  }

  .vowel-column .drop-zone {
    flex: 1;
    min-height: 0;
  }

  .drop-zone[data-zone="jong"] {
    grid-column: 1 / -1;
    grid-row: 3;
    min-height: 0;
  }

  .drop-zone.filled { border-style: solid; background: var(--card); }
  .drop-zone.drag-over { border-style: solid; transform: scale(1.03); border-color: var(--lavender-btn); }
  .drop-zone.correct,
  .drop-zone.locked.correct {
    border-color: var(--mint-btn) !important;
    background: var(--correct) !important;
  }
  .drop-zone.incorrect {
    border-color: var(--error-border) !important;
    background: var(--zone-bg) !important;
    box-shadow: inset 0 0 0 2px rgba(255, 120, 120, 0.55);
  }

  .drop-zone.hint-disabled {
    opacity: 0.35;
    pointer-events: none;
    border-style: dotted;
    background: var(--border-soft);
  }

  .drop-zone.hint-disabled::after {
    content: '—';
    position: absolute;
    font-size: 18px;
    color: var(--text-soft);
    pointer-events: none;
  }

  /* ── Hint dock ── */
  .match-hint-dock {
    /* layout in app-buttons.css */
  }

  .match-token-counter {
    font-family: 'Jua', sans-serif;
    font-size: 15px;
    color: var(--heading);
    padding: 8px 12px;
    border-radius: 999px;
    background: var(--yellow);
    border: 2px solid var(--yellow-btn);
    flex-shrink: 0;
  }

  .match-hint-btn {
    /* app-buttons.css */
  }

  .match-hint-cost {
    /* app-buttons.css */
  }

  /* ── Jamo tiles ── */
  .bank-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  .jamo-bank {
    flex: 1;
    min-width: 0;
    align-self: flex-start;
    display: flex;
    flex-wrap: wrap;
    align-content: flex-start;
    align-items: flex-start;
    justify-content: center;
    gap: 6px;
    min-height: calc(var(--tile-size) + 24px);
    height: auto;
    max-height: none;
    overflow-x: hidden;
    overflow-y: visible;
    background: var(--card);
    border: 2px solid var(--border-soft);
    border-radius: 20px;
    padding: 14px 14px;
    box-shadow: var(--shadow-sm);
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
  }

  .jamo-tile {
    width: var(--tile-size);
    height: var(--tile-size);
    container-type: size;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Jua', 'Noto Sans KR', sans-serif;
    cursor: grab;
    user-select: none;
    touch-action: none;
    box-shadow: var(--shadow-tile), var(--shadow-sm);
    background: var(--card);
    border: 2px solid var(--border);
    color: var(--text);
    transition: transform .15s, box-shadow .15s;
    position: relative;
    z-index: 1;
    transform-style: preserve-3d;
    perspective: 500px;
  }

  .jamo-tile-face {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    font-size: calc(var(--jamo-glyph-ratio) * 100cqmin);
    line-height: 1;
    backface-visibility: hidden;
    border-radius: inherit;
  }

  .jamo-tile-back {
    position: absolute;
    inset: 0;
    transform: rotateX(180deg);
    background: var(--correct);
    color: var(--correct-text);
    font-size: calc(var(--jamo-glyph-ratio) * 100cqmin);
    line-height: 1;
    border-radius: inherit;
  }

  .jamo-tile.revealing {
    animation: jamoFlipReveal .42s ease both;
    animation-delay: var(--flip-delay, 0ms);
  }

  .jamo-tile.revealing-wrong {
    animation: jamoFlipWrong .42s ease both;
  }

  .drop-zone.revealing {
    animation: jamoFlipReveal .42s ease both;
  }

  .drop-zone.revealing-wrong {
    animation: jamoFlipWrong .42s ease both;
  }

  @keyframes jamoFlipReveal {
    0% { transform: rotateX(0deg); }
    49% { transform: rotateX(-90deg); }
    50% { transform: rotateX(-90deg); }
    100% { transform: rotateX(0deg); }
  }

  @keyframes jamoFlipWrong {
    0%, 100% { transform: rotateX(0deg); }
    25% { transform: rotateX(-20deg); }
    75% { transform: rotateX(20deg); }
  }

  .jamo-tile.revealed.correct-flip .jamo-tile-front {
    background: var(--correct);
    color: var(--correct-text);
  }

  .jamo-tile.in-zone {
    width: 100%;
    height: 100%;
    max-width: 100%;
    max-height: 100%;
    aspect-ratio: unset;
    container-type: normal;
    background: transparent !important;
    border-color: transparent !important;
    border-width: 0 !important;
    box-shadow: none !important;
    border-radius: 0;
    min-width: 0;
    min-height: 0;
  }

  .drop-zone[data-zone="cho"] .jamo-tile.in-zone .jamo-tile-face,
  .drop-zone[data-zone="cho"] .jamo-tile.in-zone .jamo-tile-back,
  .drop-zone[data-zone="jungH"] .jamo-tile.in-zone .jamo-tile-face,
  .drop-zone[data-zone="jungH"] .jamo-tile.in-zone .jamo-tile-back,
  .drop-zone[data-zone="jungV"] .jamo-tile.in-zone .jamo-tile-face,
  .drop-zone[data-zone="jungV"] .jamo-tile.in-zone .jamo-tile-back,
  .drop-zone[data-zone="jong"] .jamo-tile.in-zone .jamo-tile-face,
  .drop-zone[data-zone="jong"] .jamo-tile.in-zone .jamo-tile-back {
    font-size: calc(var(--jamo-in-zone-glyph-ratio) * var(--jamo-cho-in-zone-scale, 1.2) * 100cqmin);
  }

  .drop-zone .jamo-tile.in-zone:not(.locked):not(.revealing):not(.revealed) .jamo-tile-front {
    background: transparent !important;
  }

  .jamo-tile.in-zone.selected {
    z-index: 3;
    position: relative;
  }

  .merge-slot .jamo-tile.selected,
  .merge-result .jamo-tile.selected {
    z-index: 3;
    position: relative;
  }

  .jamo-tile.dragging { opacity: .45; transform: scale(.92); pointer-events: none; }
  .jamo-tile.hidden-in-bank { opacity: 0; pointer-events: none; }
  .jamo-tile.selected {
    outline: 3px solid #F0C030;
    outline-offset: 2px;
    box-shadow:
      0 0 0 5px rgba(240, 192, 48, 0.5),
      0 4px 16px rgba(240, 192, 48, 0.35);
    transform: scale(1.05);
    z-index: 2;
    position: relative;
  }

  .drop-zone.tap-target {
    border-color: #F0C030 !important;
    border-style: solid !important;
    box-shadow:
      0 0 0 4px rgba(240, 192, 48, 0.45),
      inset 0 0 14px rgba(240, 192, 48, 0.25);
    transform: scale(1.03);
    z-index: 1;
    cursor: pointer;
  }

  #rotation-dock.tap-target {
    outline: 3px solid #F0C030;
    outline-offset: 2px;
    box-shadow:
      0 0 0 5px rgba(240, 192, 48, 0.5),
      0 4px 14px rgba(240, 192, 48, 0.3);
    cursor: pointer;
  }

  .merge-slot.tap-target,
  .merge-result.tap-target {
    border-color: #F0C030 !important;
    border-style: solid !important;
    box-shadow:
      0 0 0 4px rgba(240, 192, 48, 0.45),
      inset 0 0 10px rgba(240, 192, 48, 0.2);
    cursor: pointer;
  }
  .jamo-tile.locked {
    background: var(--correct) !important;
    border-color: var(--mint-btn) !important;
    color: var(--correct-text);
    cursor: default;
    pointer-events: none;
  }

  .jamo-tile.bounce { animation: tileBounce .35s ease; }

  .jamo-ghost {
    position: fixed;
    z-index: 100000;
    pointer-events: auto;
    touch-action: none;
    transform: translate(-50%, -50%) scale(1.08);
    opacity: 1 !important;
    visibility: visible !important;
    display: flex;
    align-items: center;
    justify-content: center;
    width: var(--tile-size, 52px);
    height: var(--tile-size, 52px);
    min-width: 0;
    min-height: 0;
    flex-shrink: 0;
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    border-radius: 16px;
    container-type: size;
    font-family: 'Jua', 'Noto Sans KR', sans-serif;
    line-height: 1;
    background: rgba(255, 255, 255, 0.98) !important;
    color: #2A4A58 !important;
    border: 2px solid rgba(255, 255, 255, 0.9) !important;
    box-shadow:
      inset 0 2px 0 rgba(255, 255, 255, 0.85),
      0 10px 28px rgba(0, 40, 50, 0.38);
    transform-style: flat;
  }

  .jamo-ghost-glyphs {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: calc(var(--jamo-glyph-ratio) * 100cqmin);
    line-height: 1;
  }

  .jamo-tile.snap-in { animation: snapIn .3s ease; }

  /* ── Feedback ── */
  .game-feedback {
    text-align: center;
    padding: 14px 18px;
    border-radius: 16px;
    font-size: clamp(14px, 3.8vw, 16px);
    min-height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1.45;
    transition: all .3s;
  }

  .game-feedback.empty { background: transparent; color: transparent; }
  .game-feedback.info {
    background: var(--info-bg);
    color: var(--info-text);
    border: 2px solid var(--blue-btn);
  }
  .game-feedback.success {
    background: var(--success-bg);
    color: var(--success-text);
    border: 2px solid var(--mint-btn);
    font-weight: 500;
  }
  .game-feedback.error {
    background: var(--error-bg);
    color: var(--error-text);
    border: 2px solid var(--error-border);
  }

  /* ── Actions ── */
  .match-actions {
    /* app-buttons.css */
  }

  .btn {
    /* app-buttons.css */
  }

  /* ── Letter swap + vowel merge dock (beside jamo bank) ── */
  .bank-tools {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .vowel-merge-dock {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 6px 8px;
    border-radius: 14px;
    border: 2px dashed var(--lavender-btn);
    background: var(--lavender);
    touch-action: none;
  }

  .vowel-merge-dock.drag-over {

<script>
const isDailyMatch = MatchDaily.isDailyModeFromUrl();

function startKoreanMatch(selection) {
  document.getElementById('match-mode-overlay')?.classList.add('hidden');
  const isMulti = selection === 'multi' || MatchModePicker.isMultiFindMode?.(selection);
  const params = new URLSearchParams(window.location.search);
  if (!isDailyMatch && !params.get('length') && !params.get('mode') && !params.get('game')) {
    if (isMulti) params.set('game', 'multi');
    else params.set('length', String(selection));
    const next = `${window.location.pathname}?${params.toString()}`;
    window.history.replaceState(null, '', next);
  } else if (isMulti && params.get('game') !== 'multi') {
    params.set('game', 'multi');
    params.delete('length');
    params.delete('mode');
    window.history.replaceState(null, '', `${window.location.pathname}?${params.toString()}`);
  }
  const root = document.getElementById('match-app');
  if (!root) {
    console.error('[Jamodeul] #match-app missing');
    return;
  }
  if (window.__koreanMatchGameInstance) {
    window.__koreanMatchGameInstance.destroy?.();
  }
  const game = new KoreanMatchGame(root, {
    daily: isDailyMatch,
    wordLength: isMulti ? 1 : selection,
    mode: isMulti ? 'multi' : selection,
    multiFind: isMulti,
  });
  window.__koreanMatchGameInstance = game;
  game.mount();
}

(async function () {
  FirebaseSocial?.init?.({});
  const initReady = AppNav.initPage({ topNav: false });

  MatchModePicker.resolveMode(async (length) => {
    try {
      await initReady;
    } catch (err) {
      console.error('[Jamodeul] match init failed', err);
    }
    startKoreanMatch(length);
  });
})();
</script>
</body>
</html>
