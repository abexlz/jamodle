<!DOCTYPE html>
<html lang="ko">
<head>
<script>
(function(){
  try {
    var p = JSON.parse(localStorage.getItem('jamodeul-preferences') || '{}');
    var theme = p.theme || localStorage.getItem('jamodeul-theme') || 'system';
    var resolved = theme;
    if (theme === 'system' || (theme !== 'light' && theme !== 'dark')) {
      resolved = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    document.documentElement.setAttribute('data-theme', resolved);
    if (p.reduceMotion) document.documentElement.classList.add('reduce-motion');
    document.documentElement.lang = p.language === 'ko' ? 'ko' : 'en';
  } catch (e) {}
})();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0097B2">
<title>Tutorial — Jamodeul</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/app-preferences.css">
<link rel="stylesheet" href="css/app-buttons.css">
<link rel="stylesheet" href="css/korean-match.css">
<link rel="stylesheet" href="css/app-theme.css">
<link rel="stylesheet" href="css/app-wordle-ui.css">
<link rel="stylesheet" href="css/tutorial.css">
<style>
  body {
    margin: 0;
    min-height: 100dvh;
    background: var(--bg, #FFF8F5);
    color: var(--text, #5D6470);
    font-family: 'Noto Sans KR', sans-serif;
    padding: calc(12px + env(safe-area-inset-top, 0px)) 12px calc(16px + env(safe-area-inset-bottom, 0px));
  }
  body.match-page #match-app {
    --block-size: min(120px, 28vw);
    --tile-size: min(52px, calc(var(--block-size) * 0.48));
    max-width: 520px;
    margin: 0 auto;
  }
</style>
</head>
<body class="match-page tutorial-page">
<div id="match-app"></div>

<script src="js/app-bootstrap.js"></script>

<script src="js/match-word-bank.js"></script>
<script src="js/match-words.js"></script>
<script src="js/match-daily.js"></script>
<script src="js/menu-progress.js"></script>
<script src="js/dev-build.js"></script>
<script src="js/learning-streak.js"></script>
<script src="js/profile-service.js"></script>
<script src="js/level-utils.js"></script>
<script src="js/badge-service.js"></script>
<script src="js/xp-service.js"></script>
<script src="js/tutorial-program.js"></script>
<script src="js/tutorial-progress-service.js"></script>
<script src="js/korean-match.js"></script>
<script src="js/tutorial-coach-ui.js"></script>
<script src="js/match-tutorial-app.js"></script>
<script>
(async function () {
  await AppBootstrap?.init?.();
  I18n?.init?.();
  ProfileService?.loadProfile?.();
  const params = new URLSearchParams(location.search);
  const replay = params.get('replay') === '1';
  const devReplay = replay && DevBuild?.hasDevAccess?.() === true;
  if (TutorialProgress?.mustCompleteOnboarding?.() === false && !devReplay) {
    location.replace('index.html');
    return;
  }
  new MatchTutorialApp().mount();
})();
</script>
</body>
</html>
