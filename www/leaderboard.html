<!DOCTYPE html>
<html lang="ko">
<head>
<script>
(function(){
  try {
    var p = JSON.parse(localStorage.getItem('jamodeul-preferences') || '{}');
    var theme = p.theme || localStorage.getItem('jamodeul-theme') || 'system';
    var resolved = theme;
    if (theme === 'system' || (theme !== 'light' && theme !== 'dark')) {
      resolved = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    document.documentElement.setAttribute('data-theme', resolved);
    if (p.reduceMotion) document.documentElement.classList.add('reduce-motion');
    if (p.highContrast) document.documentElement.classList.add('high-contrast');
    if (p.largeText) document.documentElement.classList.add('large-text');
    document.documentElement.lang = p.language === 'ko' ? 'ko' : 'en';
    document.documentElement.setAttribute('data-font-pack', p.devFontPack === 'jua' ? 'jua' : 'junegull');
  } catch (e) {}
})();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0097B2">
<title>Leaderboard — 자모들</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">

    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100dvh;
    padding: calc(12px + var(--safe-top)) 14px calc(24px + var(--safe-bottom));
    font-family: 'Noto Sans KR', sans-serif;
  }
</style>

<body>

<div class="top-nav-actions">
  <a class="top-nav-btn" href="index.html" id="nav-back" data-i18n-aria="nav.back">←</a>
</div>

<div class="leaderboard-page" id="leaderboard-page">
  <header class="leaderboard-page-header">
    <h1 data-i18n="leaderboard.title">Leaderboard</h1>
    <p class="leaderboard-page-sub" data-i18n="leaderboard.subtitleMatch">Fastest daily match times · KST</p>
  </header>

  <div class="leaderboard-panel">
    <div class="leaderboard-tabs" role="tablist" aria-label="Game">
      <button type="button" class="leaderboard-tab active" data-social-action="leaderboard-tab" data-leaderboard-tab="match" data-i18n="leaderboard.dailyMatch">Daily Match</button>
      <button type="button" class="leaderboard-tab" data-social-action="leaderboard-tab" data-leaderboard-tab="streak" data-i18n="leaderboard.wordChainStreak">Word Chain Streak</button>
    </div>

    <div class="leaderboard-scope-tabs" role="tablist" aria-label="Scope">
      <button type="button" class="leaderboard-scope-tab active" data-social-action="leaderboard-scope" data-leaderboard-scope="global" data-i18n="leaderboard.global">Global</button>
      <button type="button" class="leaderboard-scope-tab" data-social-action="leaderboard-scope" data-leaderboard-scope="friends" data-i18n="leaderboard.friends">Friends</button>
    </div>

    <p class="leaderboard-date-line" id="leaderboard-date"></p>
    <ul class="leaderboard-list" id="leaderboard-list" aria-live="polite"></ul>

    <div class="leaderboard-login-card" id="leaderboard-login-card" hidden>
      <p data-i18n="leaderboard.loginHint">Sign in to view rankings and submit your daily times.</p>
      <button type="button" class="leaderboard-login-btn" data-social-action="login" data-i18n="profile.social.login">Google 로그인</button>
    </div>
  </div>

  <a class="leaderboard-back" href="index.html" data-i18n="leaderboard.backHome">← Home</a>
</div>
